<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Price Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Commodity Pro</h1>
            <p>Real-time global market tracker</p>
        </div>
    </header>

    <main class="container main-content">
        <aside class="sidebar">
            <section class="table-section">
                <h2>Market Overview</h2>
                <div class="table-container">
                    <table id="commodity-table">
                        <thead>
                            <tr>
                                <th>Commodity</th>
                                <th class="text-right">Price (USD)</th>
                                <th class="text-right">24h Change</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </aside>

        <section class="content-area">
            <div class="card chart-card">
                <div class="chart-header">
                    <h2 id="chart-title">Loading...</h2>
                    
                    <div class="timeframe-filters" id="timeframe-buttons">
                        <button class="filter-btn active" data-period="1D">1D</button>
                        <button class="filter-btn" data-period="1M">1M</button>
                        <button class="filter-btn" data-period="3M">3M</button>
                        <button class="filter-btn" data-period="6M">6M</button>
                        <button class="filter-btn" data-period="1Y">1Y</button>
                        <button class="filter-btn" data-period="3Y">3Y</button>
                        <button class="filter-btn" data-period="5Y">5Y</button>
                    </div>
                </div>
                
                <div class="chart-container">
                    <canvas id="commodityChart"></canvas>
                </div>
            </div>

            <div class="card performance-card">
                <h2>Performance Analysis</h2>
                <div class="table-container">
                    <table class="perf-table">
                        <thead>
                            <tr>
                                <th>Period</th>
                                <th class="text-right">Change (USD)</th>
                                <th class="text-right">Change (%)</th>
                            </tr>
                        </thead>
                        <tbody id="perf-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
