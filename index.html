<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Price Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="topbar">
        <div class="container topbar-inner">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="16" width="12" height="8" rx="4" fill="#F59E0B" stroke="#B45309" stroke-width="1.5"/>
                    <path d="M21 24C23.2091 24 25 22.2091 25 20C25 16.5 21 11 21 11C21 11 17 16.5 17 20C17 22.2091 18.7909 24 21 24Z" fill="#1E293B" stroke="#0F172A" stroke-width="1.5"/>
                    <path d="M15 4C15 4 10 7 10 11C10 13 11.5 14.5 15 14.5C18.5 14.5 20 13 20 11C20 7 15 4 15 4Z" fill="#10B981" stroke="#047857" stroke-width="1.5"/>
                </svg>
                <div class="brand-text">
                    <h1>Commodity Price</h1>
                    <p>Global Markets Dashboard</p>
                </div>
            </div>
            <div class="clock-area">
                <span class="live-indicator"></span>
                <span id="live-clock">--:--</span>
            </div>
        </div>
    </header>

    <div class="container dashboard">
        
        <aside class="market-panel">
            <div class="panel-header">
                <h2>Market Overview</h2>
            </div>
            <div id="commodity-list" class="overview-list">
                </div>
        </aside>

        <main class="main-panel">
            
            <section class="chart-card">
                <div class="chart-header">
                    <div class="chart-title-group">
                        <h2 id="chart-title">Loading...</h2>
                    </div>
                    <div class="timeframe-filters" id="timeframe-buttons">
                        <button class="filter-btn active" data-period="1D">1D</button>
                        <button class="filter-btn" data-period="1W">1W</button>
                        <button class="filter-btn" data-period="1M">1M</button>
                        <button class="filter-btn" data-period="3M">3M</button>
                        <button class="filter-btn" data-period="6M">6M</button>
                        <button class="filter-btn" data-period="1Y">1Y</button>
                        <button class="filter-btn" data-period="5Y">5Y</button>
                    </div>
                </div>
                <div class="chart-container" id="chart-container">
                    <canvas id="commodityChart"></canvas>
                    </div>
            </section>

            <section class="performance-card">
                <div class="panel-header">
                    <h2 id="perf-title">Price Performance</h2>
                </div>
                <div id="perf-cards-container" class="perf-grid">
                    </div>
            </section>

        </main>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
