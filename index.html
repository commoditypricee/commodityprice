<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Commodity Journal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Playfair Display for Serif headings, Inter for Sans-Serif text, Roboto Mono for numbers -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="journal-header">
        <div class="container header-inner">
            <div class="masthead">
                <div class="masthead-subtitle">DAILY MARKET BRIEFING</div>
                <h1 class="masthead-title">The Commodity Journal</h1>
            </div>
            <div class="header-meta">
                <div class="clock-area">
                    <span class="live-dot"></span>
                    <span id="live-clock">--:--</span>
                </div>
                <div class="edition-text">Digital Edition</div>
            </div>
        </div>
    </header>

    <div class="container journal-layout">
        
        <!-- Sol Panel: Piyasalar Listesi -->
        <aside class="sidebar-panel">
            <div class="section-header">
                <h2>Market Overview</h2>
            </div>
            <div id="commodity-list" class="market-list">
                <!-- script.js tarafından doldurulacak -->
            </div>
        </aside>

        <!-- Ana İçerik: Grafik ve Performans -->
        <main class="content-panel">
            
            <section class="chart-section">
                <div class="chart-header">
                    <h2 id="chart-title">Loading...</h2>
                    <div class="timeframe-tabs" id="timeframe-buttons">
                        <button class="tab-btn active" data-period="1D">1D</button>
                        <button class="tab-btn" data-period="1W">1W</button>
                        <button class="tab-btn" data-period="1M">1M</button>
                        <button class="tab-btn" data-period="3M">3M</button>
                        <button class="tab-btn" data-period="6M">6M</button>
                        <button class="tab-btn" data-period="1Y">1Y</button>
                        <button class="tab-btn" data-period="5Y">5Y</button>
                    </div>
                </div>
                <div class="chart-container" id="chart-container">
                    <canvas id="commodityChart"></canvas>
                </div>
            </section>

            <section class="performance-section">
                <div class="section-header">
                    <h2 id="perf-title">Price Performance</h2>
                </div>
                <div id="perf-cards-container" class="perf-blocks-grid">
                    <!-- script.js tarafından doldurulacak -->
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
